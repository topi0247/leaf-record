name: Update VRT Snapshots

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to update snapshots on'
        required: true
        default: 'main'

permissions:
  contents: write

jobs:
  update-snapshots:
    name: Update VRT Snapshots
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: front

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'yarn'
          cache-dependency-path: front/yarn.lock

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build Next.js
        run: yarn build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3000
          NEXT_PUBLIC_API_VERSION: v1
          NEXT_PUBLIC_APP_URL: http://localhost:8000
          NEXT_PUBLIC_URL: http://localhost:8000

      - name: Update VRT snapshots
        run: yarn test:vrt:update
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3000
          NEXT_PUBLIC_API_VERSION: v1
          NEXT_PUBLIC_APP_URL: http://localhost:8000
          NEXT_PUBLIC_URL: http://localhost:8000

      - name: Commit updated snapshots
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add e2e/vrt.spec.ts-snapshots/
          if git diff --cached --quiet; then
            echo "No snapshot changes."
          else
            git commit -m "chore(front): update VRT snapshots [ci skip]"
            git push origin HEAD:${{ github.event.inputs.branch }}
          fi
        working-directory: front
